version: v2

clean: true

managed:
  enabled: true

plugins:
  # Install the plugin (The binary 'protoc' is needed):
  # cargo install --git https://github.com/mathematic-inc/protovalidate-buffa protoc-gen-protovalidate-buffa
  - local: protoc-gen-protovalidate-buffa
    out: gen/rust
    strategy: all

  - remote: buf.build/anthropics/connect-rust
    out: gen/rust
    opt: [buffa_module=crate::proto]

  - remote: buf.build/anthropics/buffa
    out: gen/rust
    opt: [file_per_package=true, json=true, views=true]

inputs:
  - module: buf.build/mdostudio/mdo:main
    exclude_paths:
      - proto/tests
      - proto/experimental
